<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scribble AI — Guesser</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --ink:    #1a1a2e;
    --paper:  #fdfaf3;
    --blue:   #2563eb;
    --green:  #10b981;
    --red:    #ef4444;
    --yellow: #fbbf24;
    --chalk:  #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'Nunito', sans-serif;
    color: var(--chalk);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: relative; z-index: 10;
    width: 100%; max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
  }
  .logo { font-family: 'Boogaloo', cursive; font-size: 1.6rem; color: var(--yellow); }
  .role-badge {
    background: rgba(16,185,129,0.2);
    border: 1px solid rgba(16,185,129,0.5);
    color: #6ee7b7;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 99px;
  }
  .score-display {
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .score-num { color: var(--yellow); }

  /* ── STATUS BAR ── */
  .status-bar {
    position: relative; z-index: 10;
    width: 100%; max-width: 900px;
    display: flex; gap: 1rem; align-items: center;
    padding: 0 1.5rem 0.5rem;
  }

  .timer-wrap {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
    height: 8px;
    position: relative;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    transition: width 1s linear, background 1s;
    border-radius: 8px;
  }
  .timer-bar.danger { background: linear-gradient(90deg, var(--red), var(--yellow)); }

  .timer-text {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    min-width: 3rem;
    text-align: right;
  }

  /* ── CANVAS AREA ── */
  .canvas-wrap {
    position: relative;
    width: 100%; max-width: 860px;
    margin: 0.5rem 1.5rem;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #gameCanvas {
    display: block;
    width: 100%;
    background: var(--paper);
    cursor: default;
  }

  /* Canvas overlay for status messages */
  .canvas-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(26,26,46,0.92);
    /* Removed backdrop-filter: blur(4px); */
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    text-align: center;
    padding: 1rem;
    transition: opacity 0.4s, visibility 0.4s;
    z-index: 50;
  }
  .canvas-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  /* ── CAMERA PREVIEW ── */
  .camera-preview-wrap {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 200px;
    height: 150px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--blue);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100;
    background: #000;
    display: none; /* Shown only when web mode is active */
  }
  #videoInputVisible {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* Mirror effect */
  }
  .camera-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 0.65rem;
    padding: 2px 8px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .overlay-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
  .overlay-sub { font-size: 1rem; font-family: 'Nunito', sans-serif; opacity: 0.6; margin-top: 0.5rem; }

  /* ── GUESS PANEL ── */
  .guess-panel {
    position: relative; z-index: 10;
    width: 100%; max-width: 860px;
    padding: 1rem 1.5rem;
    display: flex; flex-direction: column; gap: 0.8rem;
  }

  .guess-input-row {
    display: flex; gap: 0.8rem;
  }
  #guessInput {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    font-size: 1.1rem;
    font-family: 'Nunito', sans-serif;
    color: var(--chalk);
    outline: none;
    transition: border-color 0.2s;
  }
  #guessInput::placeholder { color: rgba(255,255,255,0.3); }
  #guessInput:focus { border-color: var(--green); }
  #guessInput:disabled { opacity: 0.4; cursor: not-allowed; }

  #submitBtn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.9rem 1.8rem;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #submitBtn:hover  { background: #059669; }
  #submitBtn:active { transform: scale(0.97); }
  #submitBtn:disabled { background: #374151; cursor: not-allowed; }

  /* ── GUESS LOG ── */
  .guess-log {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    max-height: 140px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .guess-log:empty::before {
    content: "Guesses will appear here...";
    color: rgba(255,255,255,0.2);
    font-size: 0.85rem;
  }
  .guess-entry {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.9rem; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .guess-entry .who { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
  .guess-entry .word { font-weight: 700; }
  .guess-entry.correct .word { color: var(--green); }
  .guess-entry.wrong   .word { color: rgba(255,255,255,0.7); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: rgba(26,26,46,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 1rem 2rem;
    font-size: 1.1rem;
    font-family: 'Boogaloo', cursive;
    text-align: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.win  { border-color: var(--green); color: var(--green); }
  .toast.lose { border-color: var(--red);   color: var(--red); }
  .toast.info { border-color: var(--blue);  color: var(--blue); }

  /* Connection dot */
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
    display: inline-block;
  }
  .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Scribble AI</div>
  <div class="role-badge">💬 Guesser</div>
  <div class="score-display">
    <span>⭐</span>
    <span class="score-num" id="scoreNum">0</span>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="conn-dot" id="connDot"></div>
  <span id="connText" style="font-size:0.8rem;color:rgba(255,255,255,0.4)">Connecting...</span>
  <div style="flex:1"></div>
  <span class="timer-text" id="timerText">—</span>
  <div class="timer-wrap" style="width:200px">
    <div class="timer-bar" id="timerBar" style="width:100%"></div>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap">
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div class="canvas-overlay" id="overlay">
    <div class="overlay-emoji">🎮</div>
    <div id="overlayText">Waiting for players...</div>
    <div class="overlay-sub" id="overlaySub">Share the server URL with your friend</div>
  </div>
</div>

<!-- GUESS PANEL -->
<div class="guess-panel">
  <div class="guess-input-row">
    <input id="guessInput" type="text" placeholder="Type your guess here..." disabled autocomplete="off"/>
    <button id="submitBtn" disabled>Guess →</button>
  </div>
  <div class="guess-log" id="guessLog"></div>
</div>

<!-- MEDIAPIPE FOR IN-BROWSER DRAWING -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<!-- HIDDEN CAMERA FOR MEDIAPIPE -->
<video id="videoInput" style="display:none;" playsinline></video>

<!-- VISIBLE CAMERA PREVIEW -->
<div class="camera-preview-wrap" id="cameraPreview">
  <video id="videoInputVisible" autoplay muted playsinline></video>
  <div class="camera-label">Webcam Live</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODE SELECTOR -->
<div id="modeSelector" style="position:fixed; top:1rem; right:1rem; z-index:100; display:flex; gap:0.5rem;">
  <button id="startWebMode" style="display:none; background:var(--blue); color:white; border:none; padding:0.5rem 1rem; border-radius:8px; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; box-shadow:0 4px 12px rgba(37,99,235,0.3);">
    Enable Web Drawing 📷
  </button>
</div>

<script>
// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
let myScore   = 0;
let timerInt  = null;
let timeLeft  = 60;
let roundActive = false;
let myName    = '';
let currentRole = '';  // Track current role for MediaPipe guard

// ──────────────────────────────────────────────
//  SOCKET
// ──────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  setConn(true);
  const name = prompt('Enter your name:', 'Guesser') || 'Guesser';
  myName = name;
  socket.emit('join_game', { name });
});

socket.on('disconnect', () => setConn(false));

socket.on('joined', data => {
  showOverlay('🙋', `Joined as ${data.name}`, `Waiting for ${2 - data.player_count} more player...`);
});

socket.on('player_joined', data => {
  if (data.player_count >= 2) {
    showOverlay('🎮', 'Both players ready!', 'Starting soon...');
  }
});

socket.on('game_ready', data => {
  showOverlay('🚀', data.message, '');
});

socket.on('round_start', data => {
  clearCanvas();
  resetTimer(data.duration);
  roundActive = true;

  if (data.role === 'guesser') {
    currentRole = 'guesser';
    // CRITICAL FIX: Hide overlay for guesser so they can see the canvas!
    hideOverlay();
    enableGuessing(true);
    addGuessLog('system', `Round ${data.round} started! Start guessing...`, 'system');
    document.getElementById('startWebMode').style.display = 'none';
    showToast(`Your turn to GUESS!`, 'info');
  } else {
    currentRole = 'drawer';
    // Switched to drawer role
    enableGuessing(false);
    
    // If webcam is already on, don't show the "Waiting" overlay
    if (webModeActive) {
      hideOverlay();
    } else {
      showOverlay('✋', 'Your turn to DRAW!', 'Click "Enable Web Drawing" below');
    }
    
    document.getElementById('startWebMode').style.display = 'block';
  }
});

socket.on('round_end', data => {
  roundActive = false;
  stopTimer();
  enableGuessing(false);
  document.getElementById('startWebMode').style.display = 'none';
  const w = data.winner || 'Nobody';
  const scores = Object.entries(data.scores).map(([k,v]) => `${k}: ${v}`).join(' | ');
  showOverlay('📊', `Word was: "${data.word}"`, `Winner: ${w} | ${scores}`);

  if (data.winner === myName) {
    myScore++;
    document.getElementById('scoreNum').textContent = myScore;
    showToast(`🎉 Correct! You scored!`, 'win');
  } else if (data.winner) {
    showToast(`"${data.word}" — better luck next time`, 'lose');
  } else {
    showToast(`Time's up! Word was "${data.word}"`, 'info');
  }
});

socket.on('draw_update', data => {
  drawLine(
    data.x1 * canvas.width,
    data.y1 * canvas.height,
    data.x2 * canvas.width,
    data.y2 * canvas.height,
    data.color || '#1e1edc',
    data.width || 5
  );
});

socket.on('canvas_cleared', () => clearCanvas());

socket.on('guess_broadcast', data => {
  addGuessLog(data.name, data.guess, 'wrong');
});

socket.on('player_left', data => {
  roundActive = false;
  stopTimer();
  enableGuessing(false);
  document.getElementById('startWebMode').style.display = 'none';
  showOverlay('😢', data.message, 'Refresh to restart');
});

// ──────────────────────────────────────────────
//  GUESSING
// ──────────────────────────────────────────────
function enableGuessing(enabled) {
  document.getElementById('guessInput').disabled = !enabled;
  document.getElementById('submitBtn').disabled  = !enabled;
  if (enabled) document.getElementById('guessInput').focus();
}

document.getElementById('submitBtn').addEventListener('click', submitGuess);
document.getElementById('guessInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGuess();
});

function submitGuess() {
  const input = document.getElementById('guessInput');
  const guess = input.value.trim();
  if (!guess || !roundActive) return;
  socket.emit('submit_guess', { guess });
  input.value = '';
}

function addGuessLog(name, word, type) {
  const log  = document.getElementById('guessLog');
  const entry = document.createElement('div');
  entry.className = `guess-entry ${type}`;
  entry.innerHTML = `<span class="who">${name}:</span><span class="word">${word}</span>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// ──────────────────────────────────────────────
//  CANVAS DRAWING
// ──────────────────────────────────────────────
function clearCanvas() {
  ctx.fillStyle = '#fdfaf3';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawLine(x1, y1, x2, y2, color, width) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.stroke();
}

clearCanvas();

// ──────────────────────────────────────────────
//  TIMER
// ──────────────────────────────────────────────
function resetTimer(duration) {
  stopTimer();
  timeLeft = duration;
  updateTimerUI(duration, duration);
  timerInt = setInterval(() => {
    timeLeft--;
    updateTimerUI(timeLeft, duration);
    if (timeLeft <= 0) {
      stopTimer();
      if (roundActive) socket.emit('time_up');
    }
  }, 1000);
}

function stopTimer() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
}

function updateTimerUI(left, total) {
  const pct = (left / total) * 100;
  const bar  = document.getElementById('timerBar');
  document.getElementById('timerText').textContent = `${left}s`;
  bar.style.width = pct + '%';
  bar.className = 'timer-bar' + (left <= 10 ? ' danger' : '');
}

// ──────────────────────────────────────────────
//  UI HELPERS
// ──────────────────────────────────────────────
function showOverlay(emoji, text, sub) {
  document.querySelector('.overlay-emoji').textContent = emoji;
  document.getElementById('overlayText').textContent   = text;
  document.getElementById('overlaySub').textContent    = sub;
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

function setConn(live) {
  document.getElementById('connDot').className  = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('connText').textContent = live ? 'Connected' : 'Disconnected';
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent  = msg;
  t.className    = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
}

// ──────────────────────────────────────────────
//  MEDIAPIPE HANDS LOGIC (for when this player becomes the Drawer)
// ──────────────────────────────────────────────
let webModeActive = false;
let prevX = null, prevY = null;
let lastSendTime = 0;
const SEND_INTERVAL = 40; 

const videoElement = document.getElementById('videoInput');
const startBtn = document.getElementById('startWebMode');

function setupMediaPipe() {
  if (typeof Hands === 'undefined') {
    console.warn('MediaPipe Hands not loaded yet, retrying...');
    setTimeout(setupMediaPipe, 1000);
    return;
  }

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  hands.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
  });

  startBtn.addEventListener('click', () => {
    if (!webModeActive) {
      camera.start().then(() => {
        webModeActive = true;
        startBtn.textContent = 'Web Drawing Active ✅';
        startBtn.style.background = '#059669';
        showToast('Webcam drawing enabled!', 'info');
        
        // Show the visible preview and link it to the camera stream
        const previewVideo = document.getElementById('videoInputVisible');
        previewVideo.srcObject = videoElement.srcObject;
        document.getElementById('cameraPreview').style.display = 'block';

        hideOverlay();
      }).catch(err => {
        console.error('Camera failed:', err);
        showToast('Camera access denied!', 'lose');
      });
    }
  });
}

function onResults(results) {
  // ROLE GUARD: Only process hand tracking when we are the drawer
  if (currentRole !== 'drawer') return;

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    prevX = null; prevY = null;
    return;
  }

  const landmarks = results.multiHandLandmarks[0];
  const gesture = classifyGesture(landmarks);
  const tip = landmarks[8];
  const fx = tip.x;
  const fy = tip.y;

  if (gesture === 'draw') {
    if (prevX !== null && prevY !== null) {
      drawLine(prevX * canvas.width, prevY * canvas.height, fx * canvas.width, fy * canvas.height, '#1e1edc', 5);
      const now = Date.now();
      if (now - lastSendTime > SEND_INTERVAL) {
        socket.emit('draw_data', { x1: prevX, y1: prevY, x2: fx, y2: fy, color: '#1e1edc', width: 5 });
        lastSendTime = now;
      }
    }
    prevX = fx; prevY = fy;
  } else if (gesture === 'clear') {
    clearCanvas();
    socket.emit('clear_canvas');
    prevX = null; prevY = null;
  } else {
    prevX = null; prevY = null;
  }
}

function classifyGesture(lms) {
  const fingersUp = [
    lms[4].x < lms[3].x, lms[8].y < lms[6].y, lms[12].y < lms[10].y, lms[16].y < lms[14].y, lms[20].y < lms[18].y
  ];
  const upCount = fingersUp.filter(u => u).length;
  if (upCount >= 4) return 'clear';
  if (fingersUp[1] && upCount === 1) return 'draw';
  return 'stop';
}

setTimeout(setupMediaPipe, 1000);
</script>
</body>
</html>
